name: Linux Build

on:
  push:
    branches: [ "master", "dev", "research" ]
    paths-ignore:
      - '**.md'
      - 'doc/**'
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Build on both to ensure maximum coverage (22.04 for legacy/AppImage, 24.04 for modern .deb)
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev qt5-qmake qtbase5-dev-tools qttools5-dev-tools \
            cmake libboost-dev libboost-system-dev libboost-filesystem-dev \
            libboost-program-options-dev libboost-thread-dev libssl-dev \
            libminiupnpc-dev libdb++-dev dh-make build-essential zlib1g-dev \
            libfuse2 imagemagick

      - name: Prepare Version and Control
        run: |
          RAW_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.5.1.5")
          VERSION=${RAW_VERSION#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          
          # Extract Package block into a temporary file so we don't alter the repo's Source metadata
          sed -n '/^Package:/,$p' debian/control > debian/control.tmp
          sed -i "s/VERSION_HERE/$VERSION/g" debian/control.tmp
          
          # Handle the t64/non-t64 libdb naming based on OS
          if [[ "${{ matrix.os }}" == "ubuntu-24.04" ]]; then
            BDB_LIB="libdb5.3++t64"
          else
            BDB_LIB="libdb5.3++"
          fi
          echo "BDB_LIB=$BDB_LIB" >> $GITHUB_ENV

      - name: Build Headless Wallet (curecoind)
        run: |
          cd src
          make -f makefile.unix
          strip curecoind

      - name: Build GUI Wallet (curecoin-qt)
        run: |
          qmake
          make

      # --- Only build the AppImage on the OLDER runner for max compatibility ---
      - name: Package AppImage
        if: matrix.os == 'ubuntu-22.04'
        run: |
          wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -c https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          
          cp src/qt/res/icons/curecoin-128.png curecoin.png
          cp src/qt/res/images/splash.png splash.png
          
          echo -e "[Desktop Entry]\nType=Application\nName=CureCoin\nExec=curecoin-qt\nIcon=curecoin\nCategories=Finance;P2P;Network;" > curecoin.desktop
          export QMAKE=/usr/lib/qt5/bin/qmake
          ./linuxdeploy-x86_64.AppImage --appdir AppDir -e curecoin-qt -d curecoin.desktop -i curecoin.png --plugin qt --output appimage

      - name: Package Debian (.deb)
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/bin
          cp curecoin-qt pkg/usr/bin/
          cp src/curecoind pkg/usr/bin/
          
          # Generate shlibs, discarding any "diversion" warnings
          SHLIBS=$(dpkg-shlibdeps -O pkg/usr/bin/curecoin-qt 2>/dev/null | sed 's/shlibs:Depends=//')
          
          # Construct Depends line using the OS-specific BDB_LIB we defined earlier
          if [ -z "$SHLIBS" ]; then
            FINAL_DEPS="${{ env.BDB_LIB }}"
          else
            FINAL_DEPS="$SHLIBS, ${{ env.BDB_LIB }}"
          fi
          
          # Inject final dependencies and move to the build folder
          sed "s/FINAL_DEPENDS/$FINAL_DEPS/g" debian/control.tmp > pkg/DEBIAN/control
          
          dpkg-deb --build pkg curecoin-${{ env.APP_VERSION }}-${{ matrix.os }}-amd64.deb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CureCoin-Installers-${{ matrix.os }}
          path: |
            *.AppImage
            *.deb
            src/curecoind
            curecoin-qt